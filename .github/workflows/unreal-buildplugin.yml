name: Unreal BuildPlugin

on:
  workflow_dispatch:
    inputs:
      runner_labels_json:
        description: 'JSON labels for a self-hosted runner with Unreal Engine installed, e.g. ["self-hosted","Windows","Unreal"] or ["self-hosted","macOS","Unreal"].'
        required: true
        default: '["self-hosted","Windows","Unreal"]'
      runuat_path:
        description: "Path to Engine/Build/BatchFiles/RunUAT.bat/.sh/.command on the runner"
        required: true
        default: "C:/Program Files/Epic Games/UE_5.6/Engine/Build/BatchFiles/RunUAT.bat"
      target_platform:
        description: "Unreal BuildPlugin target platform"
        required: true
        default: "Win64"
        type: choice
        options:
          - Win64
          - Mac
      expect_layout:
        description: "Expected package layout after BuildPlugin"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - source
          - binary
      no_rocket:
        description: "Do not pass -Rocket to BuildPlugin"
        required: true
        default: false
        type: boolean
      native_staging_mode:
        description: "placeholder keeps #142-style source/engine checks; require is mandatory for #139 native-link evidence"
        required: true
        default: "placeholder"
        type: choice
        options:
          - placeholder
          - require
      build_native_payload:
        description: "Build and stage native nozzle payload from deps/nozzle before the staging check. Required for #139 evidence when binaries are not committed."
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.target_platform }}
  cancel-in-progress: false

jobs:
  buildplugin:
    name: BuildPlugin (${{ inputs.target_platform }})
    runs-on: ${{ fromJSON(inputs.runner_labels_json) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check static source shape first
        run: python3 scripts/check_package_shape.py

      - name: Build staged native nozzle payload
        if: ${{ inputs.build_native_payload }}
        run: python3 scripts/stage_native_nozzle.py --platform "${{ inputs.target_platform }}"

      - name: Check native staging contract
        shell: bash
        run: |
          if [ "${{ inputs.native_staging_mode }}" = "require" ]; then
            python3 scripts/check_native_staging.py --require "${{ inputs.target_platform }}" --inspect-deps
          else
            python3 scripts/check_native_staging.py
          fi

      - name: Verify RunUAT path exists
        shell: bash
        run: |
          test -f "${{ inputs.runuat_path }}" || {
            echo "RunUAT path does not exist: ${{ inputs.runuat_path }}" >&2
            exit 1
          }

      - name: Run BuildPlugin with package assertions
        shell: bash
        run: |
          command=(
            python3
            scripts/run_build_plugin.py
            --runuat "${{ inputs.runuat_path }}"
            --package "build/BuildPlugin/Nozzle-${{ inputs.target_platform }}"
            --target-platform "${{ inputs.target_platform }}"
            --expect-layout "${{ inputs.expect_layout }}"
          )
          if [ "${{ inputs.no_rocket }}" = "true" ]; then
            command+=(--no-rocket)
          fi
          "${command[@]}"

      - name: Check packaged native staging contract
        if: ${{ inputs.native_staging_mode == 'require' }}
        shell: bash
        run: |
          python3 scripts/check_native_staging.py \
            --staged-root "build/BuildPlugin/Nozzle-${{ inputs.target_platform }}/ThirdParty/nozzle" \
            --require "${{ inputs.target_platform }}" \
            --inspect-deps

      - name: Upload asserted BuildPlugin package
        uses: actions/upload-artifact@v4
        with:
          name: nozzle-unreal-buildplugin-${{ inputs.target_platform }}
          path: build/BuildPlugin/Nozzle-${{ inputs.target_platform }}
          if-no-files-found: error
