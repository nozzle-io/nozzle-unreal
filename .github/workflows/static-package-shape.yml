name: Static Package Shape

on:
  push:
    branches: [main, stable]
  pull_request:
    branches: [main, stable]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' && github.event_name != 'release' }}

jobs:
  shape:
    name: Static scaffold/package checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check repository shape
        run: python3 scripts/check_package_shape.py

      - name: Check native staging contract
        run: python3 scripts/check_native_staging.py

      - name: Check package assertion regressions
        run: python3 scripts/check_build_plugin_package_assertions.py

      - name: Create source-shape package
        run: python3 scripts/package_source.py --output build/nozzle-unreal-scaffold.zip --root-name nozzle-unreal-scaffold

      - name: Check source-shape package
        run: python3 scripts/check_package_shape.py --package build/nozzle-unreal-scaffold.zip

      - name: Upload source-shape package
        uses: actions/upload-artifact@v4
        with:
          name: nozzle-unreal-scaffold
          path: build/nozzle-unreal-scaffold.zip

  native-bridge:
    name: Native bridge compile (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-d3d11
            runner: windows-latest
          - platform: macos-metal
            runner: macos-latest
          - platform: linux-unsupported
            runner: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure native bridge compile check
        run: cmake -S . -B build/native-ci -DNOZZLE_UNREAL_NATIVE_WITH_NOZZLE_CORE=ON

      - name: Build native bridge compile check
        run: cmake --build build/native-ci --target nozzle_unreal_native_bridge nozzle_unreal_native_bridge_compile_check --config Release

      - name: Configure native bridge disabled-core guard check
        run: cmake -S . -B build/native-ci-disabled -DNOZZLE_UNREAL_NATIVE_WITH_NOZZLE_CORE=OFF

      - name: Build native bridge disabled-core guard check
        run: cmake --build build/native-ci-disabled --target nozzle_unreal_native_bridge nozzle_unreal_native_bridge_compile_check --config Release
